# MeshcoreBot example configuration.
# Run:
#   meshcorebot examples/meshcorebot.example.yaml
# Validate only:
#   meshcorebot --check examples/meshcorebot.example.yaml

# ═══════════════════════════════════════════════════════════════════════════════
# EDITABLE KNOBS — change these, leave the rest alone.
#
# Top-level keys starting with `_` are scratch space for YAML anchors; load_config
# strips them before validation. Tasks below pull these via merge keys (<<: *…).
# ═══════════════════════════════════════════════════════════════════════════════

# Which tasks to actually run this session. Flip true ↔ false; disabled tasks
# stay defined but are skipped by the scheduler.
_run:
  connections_probe: &run_probe   false
  traces_from_3333:  &run_3333    true
  traces_from_3434:  &run_3434    false

# Which output sinks to enable. console = stdout, jsonl = ./logs/*.jsonl, mqtt = broker.
_sinks_on:
  console: &sink_console  true
  jsonl:   &sink_jsonl    false
  mqtt:    &sink_mqtt     false

# How to connect to the companion node. Two prebuilt blocks below; the active one
# is referenced in `transport:` further down via *transport_ble / *transport_serial.
# Edit only the one you actually use; flip the alias in `transport:` to switch.
# BLE devices seen during a 12s scan (2026-05-14). Use one of these aliases
# at `_transport_options.ble.name` below to pick which companion to connect to.
# Substring match against advertised local_name (case-insensitive).
_ble_devices:
  any:         &ble_any         null               # null → scan + interactive prompt (or first match if non-TTY)
  kopcap_v4:   &ble_kopcap_v4   "Kopcap V4"        # MeshCore-Kopcap V4️⃣        CBC62442-22C1-…  RSSI ≈ -62
  kopcap_echo: &ble_kopcap_echo "Kopcap Echo"      # MeshCore-Kopcap Echo 🔁     1C3DFD1B-EFEF-…  RSSI ≈ -48
  kopcap_114:  &ble_kopcap_114  "Kopcap 1"         # Meshcore-Kopcap 1️⃣1️⃣4️⃣  096BFFF3-2179-…  RSSI ≈ -70 (T114)

_transport_options:
  ble: &transport_ble
    type: ble
    # Pick a device — three ways, in priority order:
    #   address: "AA:BB:..."  exact MAC/UUID, skips scan entirely
    #   name:    *ble_<one>   substring of advertised name (see _ble_devices above)
    #   both null            scan + interactive prompt (or first match if non-TTY)
    address: null
    name: *ble_kopcap_114               # ← flip alias to switch device
#    name: *ble_kopcap_v4               # ← flip alias to switch device
#    name: *ble_any               # ← flip alias to switch device
    pin: null                          # set int if companion requires pairing PIN
    scan_timeout: 15s
  serial: &transport_serial
    type: serial
    port: /dev/cu.usbmodem1101         # `ls /dev/cu.usbmodem*` after plug-in
    baudrate: 115200

# Common defaults for every trace_matrix task. Override per-task as needed.
_trace_defaults: &trace_defaults
  type: trace_matrix
  cycles: 0                    # 0 = run until Ctrl-C; or N for N cycles then exit
  cycle_interval: 1m          # between cycle starts (`5m`, `30s`, `1h`, or seconds)
  trace_delay: 10s             # gap between consecutive traces inside one cycle
  timeout: 5s                  # per-trace wait for TRACE_DATA before counting timeout
  auth_code: 0
  # flags: null              # null → auto-detect path-hash width from hex segment.
                              # Override only if you need a non-standard mode (0=1B, 1=2B, 2=4B, 3=8B).

# Pre-defined OTHER-repeater lists. Each task picks one via `others: *<anchor>`
# in the tasks section below. Available choices:
#   *others_full                — all known repeaters
#   *others_good                — your hand-picked reliable subset (edit to taste)
#   *only_5A94 / *only_4A2C / *only_3A2A / *only_FFFF / *only_5798 / *only_1488
#                               — single-OTHER lists for targeted probing
_others_pool:
  full: &others_full
    - "5A94"
    - "4A2C"
    - "3A2A"
    - "FFFF"
    - "5798"
    - "1488"
  good: &others_good           # ← edit to your "reliable" subset (today: same as full)
    - "5A94"
    - "4A2C"
    - "3A2A"
  # Single-OTHER focused lists. Useful when one neighbour misbehaves and you
  # want concentrated stats without others diluting the timing.
  only_5A94: &only_5A94 ["5A94"]
  only_4A2C: &only_4A2C ["4A2C"]
  only_3A2A: &only_3A2A ["3A2A"]
  only_FFFF: &only_FFFF ["FFFF"]
  only_5798: &only_5798 ["5798"]
  only_1488: &only_1488 ["1488"]
  only_DB6B: &only_DB6B ["DB6B"]
  only_ABCD: &only_ABCD ["ABCD"]

# Per-task OTHER-list selector. Tasks reference these via merge keys, so
# THIS is the one place to edit when you want a different list for a task —
# the task bodies below stay untouched.
_for_3333: &for_3333
  others: *others_good               # *others_full | *others_good | *only_<HEX>

_for_3434: &for_3434
  others: *others_full               # *others_full | *others_good | *only_<HEX>

# ═══════════════════════════════════════════════════════════════════════════════
# Transport / sinks / bot — set once, rarely touched.
# ═══════════════════════════════════════════════════════════════════════════════

# Active transport — flip the alias here.
# Heltec T114 companion firmware is BLE-only (USB CDC enumerates but doesn't speak
# companion API); use *transport_ble. *transport_serial works on USB-capable companions.
transport: *transport_ble                # *transport_ble  |  *transport_serial

sinks:
  console:
    enabled: *sink_console
    color: true
  jsonl:
    enabled: *sink_jsonl
    path: ./logs/meshcorebot-{date}.jsonl
    # events: [trace_data, trace_timeout, chan_msg_sent, status]   # null → all
  mqtt:
    enabled: *sink_mqtt
    broker: 192.168.8.121               # local Mosquitto on LAN
    port: 1883                          # plain TCP, no TLS
    username: meshcore
    password: meshcore
    topic_prefix: meshcore/probe1       # publishes as <prefix>/<event>
    qos: 0
    retain: false

bot:
  device_name: probe-east
  reconnect: true
  reconnect_delay: 10s
  # Global throttle: minimum gap between any two send_trace BLE-events across
  # ALL trace_matrix tasks (within-task pacing still comes from `trace_delay`).
  # Default 2s — quiet enough that the repeater can finish relaying one packet
  # before the next arrives. Set to null or 0 to disable; bump higher if you
  # want more headroom.
  # cross_task_delay: 2s

# ═══════════════════════════════════════════════════════════════════════════════
# Tasks — only the parts that differ per-task. Shared knobs come from `_trace_defaults` above.
#
# Both trace_matrix tasks below run concurrently (independent asyncio coroutines,
# correlated by per-trace tag). On the same companion node they share the radio,
# which serializes transmissions but doesn't conflict logically.
#
# Output per cycle:
#   - per-trace:  `trace_sent` → `trace_data` (SNRs along path) | `trace_timeout`
#   - end of cycle: `trace_cycle_summary` with cumulative table
#       Test       SNR→    SNR←    Trace
#       5A94       8.55   10.80    15/21
# Ctrl-C: same table printed to stderr; structured records go to jsonl/mqtt
# for every cycle except the post-cancel one (sinks are shutting down).
# ═══════════════════════════════════════════════════════════════════════════════

tasks:
  # Periodic channel messages — replaces the old meshcore-probe.py behaviour.
  - name: connections-probe
    type: chan_msg
    enabled: *run_probe
    interval: 5m
    channel: "#connections"             # name or numeric index as string
    messages:
      - "p"
      - "mt"
    message_delay: 10s

  # Trace matrix from MY=3333 (Observer node — feeds Meshcore Analyzer via MQTT).
  # `others:` is set by `_for_3333` at top — don't change here.
  - <<: [*trace_defaults, *for_3333]
    name: traces-from-3333
    enabled: *run_3333
    my_repeater: "3333"

  # Trace matrix from MY=3434 (plain repeater). `others:` set by `_for_3434` at top.
  - <<: [*trace_defaults, *for_3434]
    name: traces-from-3434
    enabled: *run_3434
    my_repeater: "3434"

  # --- legacy round-robin trace task (kept for reference / simpler use cases) ---
  # - name: trace-known-routes
  #   type: trace_loop
  #   enabled: false
  #   interval: 15m
  #   mode: round_robin
  #   timeout: 5s
  #   paths:
  #     - {name: rpt-33, path: "33", tag_field: rpt-33}
  #     - {name: rpt-34, path: "34", tag_field: rpt-34}
